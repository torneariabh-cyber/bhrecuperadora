<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0b2b3b 0%, #123e52 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h2 { color: #0b2b3b; margin-bottom: 20px; }
        .btn {
            background: #0b2b3b;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
        }
        .btn:hover { background: #f9b81b; color: #0b2b3b; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; color: white; }
        .btn-success { background: #28a745; }
        .senha-atual {
            background: #f4f7fc;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 18px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .info {
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-key"></i> Recuperar Senha Admin</h2>
        
        <div id="status"></div>
        
        <div class="senha-atual">
            <strong>Senha atual:</strong><br>
            <span id="senhaAtual">-</span>
        </div>
        
        <hr>
        
        <h3>Redefinir Senha</h3>
        <input type="password" id="novaSenha" placeholder="Digite a nova senha">
        <input type="password" id="confirmaSenha" placeholder="Confirme a nova senha">
        
        <button class="btn btn-success" onclick="redefinirSenha()">Redefinir Senha</button>
        <button class="btn" onclick="irParaAdmin()">Ir para Admin</button>
        <button class="btn btn-danger" onclick="limparSessao()">Limpar Sessão</button>
        
        <div class="info">
            <i class="fas fa-info-circle"></i> 
            Se a senha aparecer como "null", a senha padrão é <strong>admin123</strong>
        </div>
    </div>

    <script>
        function mostrarSenhaAtual() {
            const senha = localStorage.getItem('admin_senha');
            const span = document.getElementById('senhaAtual');
            if (senha) {
                span.innerHTML = senha;
            } else {
                span.innerHTML = 'admin123 (padrão)';
            }
        }
        
        function redefinirSenha() {
            const novaSenha = document.getElementById('novaSenha').value;
            const confirma = document.getElementById('confirmaSenha').value;
            
            if (!novaSenha) {
                alert('Digite uma nova senha!');
                return;
            }
            
            if (novaSenha !== confirma) {
                alert('As senhas não coincidem!');
                return;
            }
            
            if (novaSenha.length < 4) {
                alert('A senha deve ter pelo menos 4 caracteres!');
                return;
            }
            
            localStorage.setItem('admin_senha', novaSenha);
            document.getElementById('status').innerHTML = '<p style="color: green;">✅ Senha alterada com sucesso!</p>';
            mostrarSenhaAtual();
            
            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 1500);
        }
        
        function irParaAdmin() {
            window.location.href = 'admin.html';
        }
        
        function limparSessao() {
            localStorage.removeItem('admin_logado');
            localStorage.removeItem('admin_session_start');
            document.getElementById('status').innerHTML = '<p style="color: orange;">⚠️ Sessão limpa! Agora vai pedir senha ao entrar.</p>';
            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 1500);
        }
        
        mostrarSenhaAtual();
    </script>
</body>
</html>
